# secrets-template.yaml — Maritime Navigation AI System
# ─────────────────────────────────────────────────────────────────────────────
# THIS IS A TEMPLATE ONLY.
#
# BEFORE DEPLOYMENT:
#   1. Copy this file to secrets.yaml (which is git-ignored).
#   2. Replace every REPLACE_WITH_... value with a real base64-encoded secret.
#   3. NEVER commit secrets.yaml or any file containing real credentials.
#
# How to base64-encode a value:
#   echo -n "my-secret-value" | base64
#
# Better alternatives to plain Kubernetes Secrets:
#   - AWS Secrets Manager  + External Secrets Operator
#   - HashiCorp Vault      + Vault Agent / ESO
#   - Azure Key Vault      + CSI secrets-store driver
#   - GCP Secret Manager   + External Secrets Operator
#
# Apply (after filling in real values):
#   kubectl apply -f k8s/secrets/secrets.yaml -n maritime-system
# ─────────────────────────────────────────────────────────────────────────────

# ── PostgreSQL credentials ────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: maritime-postgres-secret
  namespace: maritime-system
  labels:
    app.kubernetes.io/name: maritime-navigation-ai
    app.kubernetes.io/component: database
type: Opaque
data:
  # REPLACE: base64("your-postgres-password")
  POSTGRES_PASSWORD: UkVQTEFDRV9XSVRIX1lPVVJfUE9TVEdSRVNfUEFTU1dPUkQ=
  # REPLACE: base64("postgresql://maritime:your-password@postgres-service:5432/maritime")
  POSTGRES_URL: UkVQTEFDRV9XSVRIX1lPVVJfUE9TVEdSRVNfVVJM

---

# ── Snowflake credentials (optional — leave empty if not using Snowflake) ─────
apiVersion: v1
kind: Secret
metadata:
  name: maritime-snowflake-secret
  namespace: maritime-system
  labels:
    app.kubernetes.io/name: maritime-navigation-ai
    app.kubernetes.io/component: analytics
type: Opaque
data:
  # REPLACE: base64("your-snowflake-account-identifier")
  SNOWFLAKE_ACCOUNT: UkVQTEFDRV9XSVRIX1lPVVJfU05PV0ZMQUNLX0FDQ09VTlQ=
  # REPLACE: base64("your-snowflake-username")
  SNOWFLAKE_USER: UkVQTEFDRV9XSVRIX1lPVVJfU05PV0ZMQUNLX1VTRVI=
  # REPLACE: base64("your-snowflake-password")
  SNOWFLAKE_PASSWORD: UkVQTEFDRV9XSVRIX1lPVVJfU05PV0ZMQUNLX1BBU1NXT1JE
  # REPLACE: base64("MARITIME_AIS")
  SNOWFLAKE_DATABASE: UkVQTEFDRV9XSVRIX1lPVVJfU05PV0ZMQUNLX0RB
  # REPLACE: base64("MARITIME_WH")
  SNOWFLAKE_WAREHOUSE: UkVQTEFDRV9XSVRIX1lPVVJfU05PV0ZMQUNLX1dBUkVIT1VTRQ==

---

# ── Kafka SASL credentials (only needed if Kafka auth is enabled) ─────────────
apiVersion: v1
kind: Secret
metadata:
  name: maritime-kafka-secret
  namespace: maritime-system
  labels:
    app.kubernetes.io/name: maritime-navigation-ai
    app.kubernetes.io/component: messaging
type: Opaque
data:
  # REPLACE: base64("your-kafka-username") — leave empty for no-auth dev Kafka
  KAFKA_SASL_USERNAME: ""
  # REPLACE: base64("your-kafka-password") — leave empty for no-auth dev Kafka
  KAFKA_SASL_PASSWORD: ""
