# hpa.yaml — Maritime Navigation AI System
# HorizontalPodAutoscaler for stateless, horizontally-scalable services.
#
# HPA is applied ONLY to FastAPI and React frontend:
#   ✅ FastAPI      — stateless, safe to scale; more replicas = more throughput
#   ✅ Frontend     — stateless static serving; safe to scale
#   ❌ PostgreSQL   — NOT scalable with HPA; use read replicas or managed DB
#   ❌ Kafka        — NOT scalable with HPA; use Strimzi or managed Kafka
#   ❌ live-scorer  — NOT safe with HPA; see live-scorer-deployment.yaml
#   ❌ Streamlit    — session state is in-process; scaling causes UX issues
#
# Prerequisites:
#   HPA requires the Metrics Server to be installed in your cluster.
#   Install: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#   Verify:  kubectl top nodes
#
# Apply: kubectl apply -f k8s/hpa/hpa.yaml -n maritime-system

# ── FastAPI HPA ────────────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fastapi-hpa
  namespace: maritime-system
  labels:
    app: fastapi
    app.kubernetes.io/name: maritime-navigation-ai
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fastapi

  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale up when average CPU > 70%

  behavior:
    scaleDown:
      # Wait 5 minutes before scaling down to avoid thrashing
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

---

# ── React Frontend HPA ─────────────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: maritime-system
  labels:
    app: frontend
    app.kubernetes.io/name: maritime-navigation-ai
    app.kubernetes.io/component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend

  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
